spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quant_trading
    username: ${DB_USERNAME:kimseungzzang}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # 스키마는 schema.sql로 관리, JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    enabled: false              # 초기 개발 중 비활성화

server:
  port: 8080
  error:
    include-message: always

python:
  engine:
    base-url: ${PYTHON_ENGINE_URL:http://localhost:8000}

logging:
  level:
    com.quant: DEBUG
    org.springframework.web: INFO
